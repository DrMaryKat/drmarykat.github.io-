<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doneness Challenge — Coalridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Raleway:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --char:#222831;--char-2:#2B3139;--char-3:#39414b;
    --ember:#E46A55;--ember-deep:#c2503d;--flame:#F2A28C;
    --ash:#C4BEBC;--ash-dim:#8a9099;--ash-pale:#F4F3F1;--good:#7bb86a;
    --line:rgba(196,190,188,.16);--line-strong:rgba(196,190,188,.32);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Open Sans",system-ui,sans-serif;color:var(--ash-pale);background:var(--char);-webkit-font-smoothing:antialiased;line-height:1.5;padding:14px}
  .card{max-width:520px;margin:0 auto;background:var(--char-2);border:1px solid var(--line);border-radius:18px;padding:20px;position:relative}
  .eyebrow{font-family:"Raleway",sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ember);display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .eyebrow::before{content:"";width:20px;height:1px;background:var(--ember)}
  h2{font-family:"Open Sans";font-weight:800;letter-spacing:-.02em;font-size:1.45rem;line-height:1.1;margin-bottom:6px}
  .lead{color:var(--ash);font-size:.92rem;margin-bottom:6px}
  .lead b{color:#fff}
  .mute{position:absolute;top:16px;right:16px;width:34px;height:30px;border:1px solid var(--line);background:var(--char-3);border-radius:9px;color:var(--ash);cursor:pointer;font-size:.85rem}
  .cookzone{position:relative;height:220px;background:radial-gradient(60% 80% at 50% 100%,rgba(228,106,85,.22),rgba(228,106,85,0) 70%);border:1px solid var(--line);border-radius:16px;margin-top:14px;display:grid;place-items:center;touch-action:none;overflow:hidden}
  .grate{position:absolute;bottom:0;left:0;right:0;height:60%;background:repeating-linear-gradient(90deg,transparent 0 26px,rgba(0,0,0,.5) 26px 30px);opacity:.5}
  .patty{width:124px;height:124px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#7a4a2e,#4a2a17 70%,#311a0d);box-shadow:0 0 0 4px rgba(0,0,0,.35),0 12px 20px rgba(0,0,0,.5),inset 0 -6px 14px rgba(0,0,0,.5);position:relative;z-index:1}
  .patty::before{content:"";position:absolute;inset:8px;border-radius:50%;background:radial-gradient(circle at 45% 40%,rgba(120,70,40,.5),transparent 60%)}
  .sizzle{position:absolute;inset:0;border-radius:50%}
  .probe{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:5;width:18px;cursor:grab;touch-action:none;user-select:none;text-align:center}
  .probe .needle{width:4px;height:60px;margin:0 auto;background:linear-gradient(#dfe6ea,#aeb6bc);border-radius:3px}
  .probe .head{width:40px;height:24px;margin:-2px auto 0;background:linear-gradient(#2a3138,#1a1f24);border-radius:6px;display:grid;place-items:center;font-family:"Open Sans";font-weight:700;font-size:.62rem;color:var(--ash);border:1px solid #3a424a}
  .probe.grabbing{cursor:grabbing}
  .donebar{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;justify-content:center}
  .dtag{font-family:"Open Sans";font-weight:700;font-size:.68rem;padding:5px 9px;border-radius:8px;border:1px solid var(--line);color:var(--ash-dim)}
  .dtag.hit{background:var(--ember);color:#fff;border-color:var(--ember)}
  .row{display:flex;gap:12px;align-items:center;margin-top:14px;flex-wrap:wrap}
  .btn{font-family:"Open Sans";font-weight:700;font-size:.98rem;border:none;border-radius:12px;padding:13px 22px;cursor:pointer;background:linear-gradient(135deg,var(--ember),var(--ember-deep));color:#fff;box-shadow:0 10px 24px -8px rgba(228,106,85,.6);transition:transform .12s}
  .btn:hover:not(:disabled){transform:translateY(-2px)}
  .btn:disabled{opacity:.4;cursor:not-allowed;filter:saturate(.4)}
  .small{font-size:.82rem;color:var(--ash-dim)}
  .fb{border-radius:12px;padding:12px 14px;margin-top:14px;font-size:.9rem;display:none;border:1px solid transparent}
  .fb.show{display:block}
  .fb.ok{background:rgba(123,184,106,.12);border-color:rgba(123,184,106,.4);color:#cfe9c5}
  .fb.no{background:rgba(228,106,85,.12);border-color:rgba(228,106,85,.4);color:#f4cdc4}
  .fb b{color:#fff}
  @media (prefers-reduced-motion:reduce){*{transition-duration:.08s!important}}
</style>
</head>
<body>
  <div class="card">
    <button class="mute" id="mute" title="Sound">🔊</button>
    <div class="eyebrow">The Doneness Challenge</div>
    <h2>Probe the burger to medium-rare</h2>
    <p class="lead">Color lies — temperature doesn't. Drag the probe into the center of the patty and read the internal temp. Target: <b>medium-rare, 130–135°F</b>.</p>
    <div class="cookzone" id="cookzone">
      <div class="grate"></div>
      <div class="patty" id="patty"><div class="sizzle" id="sizzle"></div></div>
      <div class="probe" id="probe" title="Drag me into the burger">
        <div class="head"><span id="probeRead">--°</span></div>
        <div class="needle"></div>
      </div>
    </div>
    <div class="donebar" id="donebar">
      <span class="dtag" data-lo="0" data-hi="124">Rare ‹125</span>
      <span class="dtag" data-lo="125" data-hi="129">Med-rare 130</span>
      <span class="dtag" data-lo="130" data-hi="139">Medium 135</span>
      <span class="dtag" data-lo="140" data-hi="154">Med-well 145</span>
      <span class="dtag" data-lo="155" data-hi="999">Well 160+</span>
    </div>
    <div class="row">
      <button class="btn" id="doneCheck" disabled>Pull it off the grill</button>
      <span class="small" id="hint">Drag the probe into the patty.</span>
    </div>
    <div class="fb" id="fb"></div>
  </div>
<script>
(()=>{
  const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
  let ac=null,muted=false;
  const audio=()=>{if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}return ac};
  function blip(f=600,d=.08,t="sine",v=.1){if(muted)return;const c=audio();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d);o.start();o.stop(c.currentTime+d)}
  function chime(){if(muted)return;[660,880,1175].forEach((f,i)=>setTimeout(()=>blip(f,.18,"sine",.09),i*70))}
  function buzz(){blip(160,.18,"square",.07)}
  function sizzle(ms=200){if(muted)return;const c=audio();if(!c)return;const n=c.sampleRate*ms/1000,buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.5);const src=c.createBufferSource();src.buffer=buf;const fl=c.createBiquadFilter();fl.type="bandpass";fl.frequency.value=3200;fl.Q.value=.7;const g=c.createGain();g.gain.value=.14;src.connect(fl);fl.connect(g);g.connect(c.destination);src.start()}
  $("#mute").addEventListener("click",e=>{muted=!muted;e.currentTarget.textContent=muted?"🔇":"🔊";if(!muted)blip(800,.06)});

  const zone=$("#cookzone"),probe=$("#probe"),patty=$("#patty"),read=$("#probeRead"),
        donebar=$("#donebar"),check=$("#doneCheck"),hint=$("#hint"),fb=$("#fb"),sz=$("#sizzle");
  let dragging=false,temp=72;
  function setTemp(t){temp=t;read.textContent=Math.round(t)+"°";$$("#donebar .dtag").forEach(tag=>{tag.classList.toggle("hit",t>=+tag.dataset.lo&&t<=+tag.dataset.hi)})}
  function inPatty(x,y){const r=patty.getBoundingClientRect();return Math.hypot(x-(r.left+r.width/2),y-(r.top+r.height/2))<r.width*.42}
  function move(e){
    if(!dragging)return;const pt=e.touches?e.touches[0]:e,zr=zone.getBoundingClientRect();
    let x=Math.max(20,Math.min(zr.width-20,pt.clientX-zr.left));
    probe.style.left=x+"px";probe.style.transform="translateX(-50%)";
    if(inPatty(pt.clientX,pt.clientY)){
      const r=patty.getBoundingClientRect(),off=Math.abs(pt.clientX-(r.left+r.width/2))/(r.width/2);
      setTemp(Math.max(72,132-off*8+(Math.random()*2-1)));
      sz.style.background="radial-gradient(circle,rgba(228,106,85,.25),transparent 60%)";
      if(Math.random()<.15)sizzle();
      check.disabled=false;hint.textContent="Reading the center — pull it off when it's right.";
    }else{setTemp(72);sz.style.background="none"}
  }
  function start(){dragging=true;probe.classList.add("grabbing");audio()}
  function end(){dragging=false;probe.classList.remove("grabbing")}
  probe.addEventListener("mousedown",start);probe.addEventListener("touchstart",start,{passive:true});
  window.addEventListener("mousemove",move);window.addEventListener("touchmove",move,{passive:true});
  window.addEventListener("mouseup",end);window.addEventListener("touchend",end);
  check.addEventListener("click",()=>{
    const ok=temp>=130&&temp<=135,near=temp>=125&&temp<=139;
    if(ok){chime();fb.className="fb show ok";fb.innerHTML="<b>Medium-rare, nailed it.</b> 130–135°F means a warm pink center and a juicy bite. Rest it three minutes and serve.";}
    else if(near){buzz();fb.className="fb show no";fb.innerHTML="<b>Close.</b> You landed near the line. Medium-rare lives at <b>130–135°F</b> — a few degrees changes the bite. Keep the probe dead-center.";}
    else{buzz();fb.className="fb show no";fb.innerHTML="<b>Off target.</b> Trust the thermometer in the <b>center</b> of the patty, not the color. Medium-rare is 130–135°F.";}
  });
})();
</script>
</body>
</html>
